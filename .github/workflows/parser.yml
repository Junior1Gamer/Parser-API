name: Scrape and deploy manga data

on:
  schedule:
    # Run daily at 04:17 UTC — avoids peak hours and gives time to finish
    # before the next day's listing update.
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: parser
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Build parser binary
        run: go build -o mfapi ./cmd/mfapi/

      - name: Restore manga detail checkpoints from output branch
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: output
          path: prev_output

      - name: Copy checkpoint files into workspace
        run: |
          mkdir -p output
          if [ -d prev_output/manga ]; then
            cp -r prev_output/manga output/manga/
            echo "Restored checkpoint: $(find output/manga -name '*.json' | wc -l) detail files"
          else
            echo "No checkpoint found (first run or empty output branch)"
          fi
          rm -rf prev_output

      - name: Run list phase (fetch all manga slugs)
        run: |
          mkdir -p output/manga
          ./mfapi \
            --mode list \
            --output output \
            --rate 500ms \
            --retries 3

      - name: Run detail phase (fetch metadata, resume-safe)
        continue-on-error: true
        timeout-minutes: 300
        run: |
          ./mfapi \
            --mode detail \
            --output output \
            --rate 500ms \
            --retries 3 \
            --parallel 4 \
            --rate-per-sec 3

      - name: Generate index metadata
        run: |
          echo "{\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"total_manga\":$(cat output/manga.json | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")}" > output/index.json

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAT || github.token }}
          publish_dir: output
          publish_branch: output
          keep_files: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com

  # Prevent GitHub from disabling this scheduled workflow after 60 days of
  # repository inactivity.
  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
