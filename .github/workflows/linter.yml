name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: read
  statuses: write

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  super-lint:
    name: Super-Linter
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      # Go is linted separately because super-linter v7.4.0 does not
      # support multi-package Go projects (pkg/mfire + cmd/mfapi).
      # --fix enables auto-formatting for gofmt, goimports, whitespace, etc.
      - name: Run golangci-lint (Go)
        continue-on-error: true
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --fix --config .github/linters/.golangci.yml ./...

      - name: Lint and auto-fix everything else
        uses: super-linter/super-linter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: true
          # Go is handled by golangci-lint step above; exclude from super-linter
          # to avoid the multi-package typechecking issue.
          FILTER_REGEX_EXCLUDE: \.go$
          DEFAULT_BRANCH: main
          LOG_LEVEL: WARN
          FIX_MODE: true
          MARKDOWN_CONFIG_FILE: .markdown-lint.yml
          YAML_CONFIG_FILE: .yaml-lint.yml
