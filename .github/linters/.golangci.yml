# golangci-lint configuration for MF-API.
# This is intentionally permissive — we rely on go vet + staticcheck for
# correctness, and keep most style decisions to gofmt / whitespace.
version: "2"

linters:
  default: none
  enable:
    - govet       # correctness (already passes CI)
    - ineffassign # detect ineffective assignments
    - bodyclose   # track HTTP response body close
    - misspell    # catch common misspellings
    - whitespace  # trailing whitespace
    - unused      # detect dead code
  disable:
    - errcheck    # too noisy for this codebase
    - funlen      # lets us keep long scraping functions readable
    - gocyclo     # complexity checks too strict for parsing logic
    - godox       # TODO comments are intentional
    - gochecknoinits # init() is fine where appropriate
  settings:
    misspell:
      locale: US
    whitespace:
      multi-if: true
      multi-func: true

formatters:
  enable:
    - gofmt       # standard formatting
    - goimports   # import ordering
  settings:
    goimports:
      local-prefixes: github.com/Junior1Gamer/MF-API

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false
